<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} — {% endif %}{{ site.title }}</title>
  <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
  <meta name="theme-color" content="#024731">

  <!-- Open Graph -->
  <meta property="og:title" content="{% if page.title %}{{ page.title }} — {% endif %}{{ site.title }}">
  <meta property="og:description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
  <meta property="og:type" content="website">
  <meta property="og:url" content="{{ site.url }}{{ page.url }}">
  {% if page.og_image %}<meta property="og:image" content="{{ site.url }}{{ page.og_image }}">{% endif %}

  <!-- Favicon -->
  <link rel="icon" href="{{ site.baseurl }}/assets/images/favicon.png" type="image/png">

  <!-- Stylesheet -->
  <link rel="stylesheet" href="{{ site.baseurl }}/assets/css/main.css">

  <!-- SEO Tag plugin -->
  {% seo %}
</head>
<body class="{% if page.url == '/' %}page-home{% else %}page-inner{% endif %}">

<header class="site-header">
  <div class="container">
    <a href="{{ site.baseurl }}/" class="site-logo" aria-label="Shepherd Research Lab Home">
      <div class="site-logo__mark" aria-hidden="true">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.5" fill="none"/>
          <circle cx="12" cy="12" r="3" fill="currentColor"/>
        </svg>
      </div>
      <div class="site-logo__text">
        <span class="site-logo__abbr">SRL</span>
        <span class="site-logo__full">Shepherd Research Lab</span>
      </div>
    </a>

    <button class="nav-toggle" id="navToggle" aria-label="Toggle navigation" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>

    <nav class="site-nav" id="siteNav" role="navigation" aria-label="Main navigation">
      {% for item in site.nav %}
      <a href="{{ site.baseurl }}{{ item.url }}" {% if page.url == item.url %}class="active" aria-current="page"{% endif %}>{{ item.title }}</a>
      {% endfor %}
    </nav>
  </div>
</header>
