# ========== CURRENT MEMBERS ==========

# ---- Principal Investigator ----
- name: "John A. Shepherd, PhD"
  role: "Principal Investigator · Interim Deputy Director & Chief Scientific Officer, UH Cancer Center · B.H. and Alice C. Beams Endowed Professor in Cancer Research"
  photo: /wp-content/uploads/2022/08/john-2-768x1024.jpg
  bio: "Leads research on imaging biomarkers for breast cancer, obesity, and osteoporosis using advanced machine-learning techniques. Directs the Hawaiʻi Pacific Islands Mammography Registry (HIPIMR) and has been continuously NIH-funded since 2005."

# ---- Postdoctoral Researchers ----
- name: "Dustin Valdez"
  role: "Postdoctoral Researcher"
  photo: /wp-content/uploads/2025/01/Valdez_Dustin_Headshot-768x1024.png
  bio: "Evaluating the iBreastExam as an early-detection tool for breast cancer. Previously researched a nutritional SMS-based intervention for pregnant women in Hawaiʻi's WIC program."

- name: "Thomas Wolfgruber"
  role: "Postdoctoral Researcher"
  photo: /wp-content/uploads/2019/05/thomas-1-1.jpg
  bio: "Data scientist and software engineer focused on mammography for risk detection using machine learning. Contributes across the lab's scientific and technical operations."

- name: "Jonathan P. Bennett, PhD"
  role: "Postdoctoral Researcher"
  photo: /wp-content/uploads/2022/09/Bennett_Jon-e1663615187454.jpg
  bio: "Holds degrees in biology, psychology, and kinesiology, with a PhD in nutritional sciences. Research examines multicompartment body-composition modeling across medical settings, athletes, and the lifespan."

# ---- PhD Students ----
