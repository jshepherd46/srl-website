  role: "PhD Student"
  photo: /wp-content/uploads/2025/04/other_sweater_headshot-768x1024.jpg
  bio: "Computer Science PhD student at the University of Hawaiʻi with undergraduate degrees in Statistics and Computer Science. Applies deep learning to breast ultrasound imaging for cancer detection."

- name: "Lydia Sollis"
  role: "PhD Student"
