# SRL Publications Tag Taxonomy
# This file is the shared vocabulary used by both the website build and the Claude agent
# when auto-classifying new papers. Keep it updated as new studies launch.
#
# Usage: A paper can have multiple tags. The website filters by tag to show
# relevant publications on each research/study page.

studies:
  - tag: 3cb
    label: "Three-Compartment Breast (3CB)"
    description: "Dual-energy compositional breast imaging for malignancy detection"
  - tag: shape-up
    label: "Shape Up!"
    description: "3D optical body scanning and blood biomarkers across the lifecourse"
  - tag: maps
    label: "MAPS"
    description: "Morphometric analysis of DXA images at population scale"
  - tag: makawalu
    label: "Makawalu"
    description: "XAI concept bottleneck model for POCUS breast cancer detection in USAPI"
